name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-dist
        run: cargo install cargo-dist --version 0.22.0
      - name: Create matrix
        id: set-matrix
        run: |
          cat > matrix.json <<'JSON'
          {"include":[{"target":"x86_64-unknown-linux-gnu","archive":"tar.gz","runner":"ubuntu-latest"},{"target":"aarch64-unknown-linux-gnu","archive":"tar.gz","runner":"ubuntu-latest"},{"target":"x86_64-apple-darwin","archive":"tar.gz","runner":"macos-latest"},{"target":"aarch64-apple-darwin","archive":"tar.gz","runner":"macos-latest"},{"target":"x86_64-pc-windows-msvc","archive":"zip","runner":"windows-latest"}]}
          JSON
          MATRIX=$(cat matrix.json)
          echo "::set-output name=matrix::${MATRIX}"

  build:
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Install cross
        if: ${{ matrix.runner == 'ubuntu-latest' }}
        run: cargo install cross --locked
      - name: Add target
        shell: bash
        run: |
          rustup target add ${{ matrix.target }} || true
      - name: Build release
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu|aarch64-unknown-linux-gnu)
            cross build --release --target ${{ matrix.target }}
              ;;
            *)
            cargo build --release --target ${{ matrix.target }}
              ;;
          esac
      - name: Archive artifact
        if: ${{ matrix.archive == 'tar.gz' }}
        shell: bash
        run: |
          ART="doora-${{ matrix.target }}"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/doora dist/${ART}
          tar -czf dist/${ART}.tar.gz -C dist ${ART}
      - name: Zip artifact
        if: ${{ matrix.archive == 'zip' }}
        shell: pwsh
        run: |
          $art = "doora-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/doora.exe" "dist/$art.exe"
          Compress-Archive -Path "dist/$art.exe" -DestinationPath "dist/$art.zip" -Force
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: dist

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-artifact"
          merge-multiple: true
          path: dist
      - name: Ensure release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --generate-notes
      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
